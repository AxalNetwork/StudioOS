name = "studioos"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ---------- KV Namespaces ----------
[[kv_namespaces]]
binding = "TOKENS"
id = "8dc26ed83d154d0ebbfcbc51f592d67c"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "be811f14b6f342be961b8daa4513fb5b"

# ---------- D1 Database ----------
[[d1_databases]]
binding = "DB"
database_name = "studioos-db"
database_id = "16a23acd-c82e-4ff1-a6c0-408e3eb014c8"

# ---------- Environment Variables ----------
# Set secrets via: npx wrangler secret put <NAME>
# Required secrets: JWT_SECRET, RESEND_API_KEY
# Optional secrets: TURNSTILE_SECRET_KEY, OPENAI_API_KEY, GITHUB_ACCESS_TOKEN

[vars]
APP_URL = "https://axal.vc"
GITHUB_REPO_OWNER = "AxalNetwork"
GITHUB_REPO_NAME = "StudioOS"
