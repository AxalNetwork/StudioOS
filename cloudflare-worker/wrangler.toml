name = "studioos"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ---------- KV Namespaces ----------
[[kv_namespaces]]
binding = "TOKENS"
id = "8dc26ed83d154d0ebbfcbc51f592d67c"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "be811f14b6f342be961b8daa4513fb5b"

# ---------- Hyperdrive (PostgreSQL) ----------
# To connect your PostgreSQL database via Hyperdrive:
# 1. Run: npx wrangler hyperdrive create studioos-db --connection-string="postgresql://user:pass@host:5432/dbname"
# 2. Uncomment the block below and paste the ID:
#
# [[hyperdrive]]
# binding = "DB"
# id = "YOUR_HYPERDRIVE_ID"

# ---------- Environment Variables ----------
# Set secrets via: npx wrangler secret put <NAME>
# Required secrets: JWT_SECRET, RESEND_API_KEY
# Optional secrets: OPENAI_API_KEY, GITHUB_ACCESS_TOKEN

[vars]
APP_URL = "https://axal.vc"
GITHUB_REPO_OWNER = "AxalNetwork"
GITHUB_REPO_NAME = "StudioOS"
